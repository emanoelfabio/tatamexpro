
<!DOCTYPE html>
<html lang="pt-br" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TatameX Performance - O Sistema Operacional do Tatame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              tatame: {
                red: '#ef4444',
                'red-dark': '#dc2626',
                black: '#020617',
                'bg-secondary': '#0f172a',
                card: '#111827',
                white: '#e5e7eb',
                gold: '#f59e0b',
                green: '#22c55e',
                'text-secondary': '#94a3b8',
                border: '#1e293b',
              }
            },
            fontFamily: {
              orbitron: ['Orbitron', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'glow-red': '0 0 20px rgba(239, 68, 68, 0.3)',
              'glow-red-sm': '0 0 10px rgba(239, 68, 68, 0.2)',
              'glow-green': '0 0 20px rgba(34, 197, 94, 0.3)',
              'card': '0 4px 24px rgba(0,0,0,0.4)',
              'card-hover': '0 8px 40px rgba(0,0,0,0.6)',
            },
            animation: {
              'pulse-red': 'pulse-red 2s ease-in-out infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'slide-up': 'slide-up 0.4s ease-out',
              'fade-in': 'fade-in 0.3s ease-out',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-primary: #020617;
        --bg-secondary: #0f172a;
        --bg-card: #111827;
        --color-red: #ef4444;
        --color-red-dark: #dc2626;
        --color-green: #22c55e;
        --color-gold: #f59e0b;
        --text-primary: #e5e7eb;
        --text-secondary: #94a3b8;
        --border-color: #1e293b;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
      }

      body {
        font-family: 'Inter', sans-serif;
        overscroll-behavior-y: contain;
        transition: background-color 0.3s ease, color 0.3s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }

      .font-bebas {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.05em;
      }

      /* Scrollbar premium */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-red);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-red-dark);
      }

      /* Hide scrollbars but allow scrolling */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Glassmorphism */
      .glass {
        background: rgba(17, 24, 39, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.05);
      }

      .glass-light {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.04);
      }

      /* Card premium */
      .card-premium {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .card-premium::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(239,68,68,0.03) 0%, transparent 60%);
        pointer-events: none;
      }

      .card-premium:hover {
        border-color: rgba(239, 68, 68, 0.3);
        box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 20px rgba(239,68,68,0.1);
        transform: translateY(-2px);
      }

      /* Button premium */
      .btn-primary {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        border: none;
        border-radius: 10px;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(239,68,68,0.3);
      }

      .btn-primary:hover {
        box-shadow: 0 6px 25px rgba(239,68,68,0.5);
        transform: translateY(-1px);
      }

      .btn-primary:active {
        transform: scale(0.97);
      }

      .btn-ghost {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--text-secondary);
        border-radius: 10px;
        transition: all 0.2s ease;
      }

      .btn-ghost:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(239,68,68,0.3);
        color: var(--text-primary);
      }

      /* Glow effects */
      .glow-red {
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
      }

      .glow-green {
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
      }

      .text-glow-red {
        text-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
      }

      /* Animated border */
      .border-glow {
        border: 1px solid rgba(239, 68, 68, 0.4);
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.15), inset 0 0 15px rgba(239, 68, 68, 0.05);
      }

      /* HUD lines */
      .hud-line {
        position: relative;
      }
      .hud-line::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(239,68,68,0.5), transparent);
      }

      /* Animations */
      @keyframes pulse-red {
        0%, 100% { box-shadow: 0 0 10px rgba(239,68,68,0.3); }
        50% { box-shadow: 0 0 30px rgba(239,68,68,0.6); }
      }

      @keyframes glow {
        from { text-shadow: 0 0 10px rgba(239,68,68,0.4); }
        to { text-shadow: 0 0 25px rgba(239,68,68,0.8), 0 0 50px rgba(239,68,68,0.3); }
      }

      @keyframes slide-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes scan-line {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      .animate-slide-up {
        animation: slide-up 0.4s ease-out;
      }

      .animate-fade-in {
        animation: fade-in 0.3s ease-out;
      }

      /* Input premium */
      input, textarea, select {
        background: rgba(15, 23, 42, 0.8) !important;
        border: 1px solid var(--border-color) !important;
        color: var(--text-primary) !important;
        border-radius: 10px !important;
        font-family: 'Inter', sans-serif !important;
        transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
      }

      input:focus, textarea:focus, select:focus {
        outline: none !important;
        border-color: rgba(239, 68, 68, 0.5) !important;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
      }

      input::placeholder, textarea::placeholder {
        color: var(--text-secondary) !important;
        opacity: 0.6 !important;
      }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .badge-red {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .badge-green {
        background: rgba(34, 197, 94, 0.15);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }

      .badge-gold {
        background: rgba(245, 158, 11, 0.15);
        color: #f59e0b;
        border: 1px solid rgba(245, 158, 11, 0.3);
      }

      .badge-blue {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }

      /* Divider */
      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-color), transparent);
      }

      /* Gradient text */
      .gradient-text-red {
        background: linear-gradient(135deg, #ef4444, #f97316);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Selection */
      ::selection {
        background: rgba(239, 68, 68, 0.3);
        color: white;
      }

      /* Transition global */
      .transition-premium {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Nav item */
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        text-decoration: none;
      }

      .nav-item:hover {
        background: rgba(239, 68, 68, 0.08);
        color: var(--text-primary);
        border-color: rgba(239, 68, 68, 0.15);
      }

      .nav-item.active {
        background: rgba(239, 68, 68, 0.12);
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.25);
      }

      /* Stat card */
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        padding: 20px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .stat-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--color-red), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .stat-card:hover::after {
        opacity: 1;
      }

      /* Progress bar */
      .progress-bar {
        height: 4px;
        background: var(--border-color);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #ef4444, #f97316);
        border-radius: 2px;
        transition: width 0.5s ease;
      }

      /* Modal overlay */
      .modal-overlay {
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      /* Responsive grid */
      .grid-auto-fit {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>

</head>
  <body class="bg-tatame-black text-tatame-white dark">
    <div id="root"></div>

</body>
</html>
