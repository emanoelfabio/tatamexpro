<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <meta name="description" content="TatameX Performance - Sistema de gerenciamento de academia de artes marciais">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TatameX">
    
    <title>TatameX Performance</title>
    
    <!-- Ícones PWA -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥋</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥋</text></svg>">
    <link rel="manifest" href="manifest.json">
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Carregando...</p>
    </div>
    
    <!-- App Container -->
    <div id="app" class="app">
        
        <!-- TELA DE LOGIN -->
        <div id="screen-login" class="screen">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1>TatameX</h1>
                    <p class="tagline">Performance System</p>
                </div>
                
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    
                    <div id="login-error" class="error-message"></div>
                    
                    <button type="submit" class="btn btn-primary btn-block">
                        Entrar
                    </button>
                </form>
                
                <div class="login-footer">
                    <p>Primeiro acesso? <a href="#" onclick="showRegister()">Cadastre-se</a></p>
                </div>
                
                <button id="install-btn" class="btn btn-secondary btn-install" style="display: none;">
                    📲 Instalar App
                </button>
            </div>
        </div>
        
        <!-- TELA DE CADASTRO -->
        <div id="screen-register" class="screen" style="display: none;">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1>Criar Conta</h1>
                </div>
                
                <form id="register-form" class="login-form">
                    <div class="form-group">
                        <label for="reg-nome">Nome Completo</label>
                        <input type="text" id="reg-nome" placeholder="Seu nome" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-password">Senha</label>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-tipo">Tipo de Conta</label>
                        <select id="reg-tipo">
                            <option value="aluno">Aluno</option>
                            <option value="professor">Professor</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    
                    <div id="register-error" class="error-message"></div>
                    
                    <button type="submit" class="btn btn-primary btn-block">
                        Criar Conta
                    </button>
                </form>
                
                <div class="login-footer">
                    <p>Já tem conta? <a href="#" onclick="showLogin()">Entrar</a></p>
                </div>
            </div>
        </div>
        
        <!-- TELA DASHBOARD -->
        <div id="screen-dashboard" class="screen" style="display: none;">
            <header class="header">
                <div class="header-content">
                    <div class="logo-small">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="header-title">
                        <h2>TatameX</h2>
                        <span class="user-name" id="user-name">Usuário</span>
                    </div>
                    <button id="logout-btn" class="btn btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </header>
            
            <main class="content">
                <!-- Avisos -->
                <section id="avisos-section" class="avisos-section" style="display: none;">
                    <div class="avisos-list"></div>
                </section>
                
                <!-- Menu Principal -->
                <section class="menu-grid">
                    <button class="menu-card" data-nav="turmas">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                                <path d="M16 3.13a4 4 0 010 7.75"/>
                            </svg>
                        </div>
                        <span>Turmas</span>
                    </button>
                    
                    <button class="menu-card" data-nav="alunos">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <span>Alunos</span>
                    </button>
                    
                    <button class="menu-card" data-nav="presenca">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                        </div>
                        <span>Presença</span>
                    </button>
                    
                    <button class="menu-card" data-nav="planos">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14.5 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7.5L14.5 2z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                        </div>
                        <span>Planos</span>
                    </button>
                    
                    <button class="menu-card" data-nav="timer">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <span>Cronômetro</span>
                    </button>
                    
                    <button class="menu-card" data-nav="anotacoes">
                        <div class="menu-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                        </div>
                        <span>Anotações</span>
                    </button>
                </section>
            </main>
            
            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-nav="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="9"/>
                        <rect x="14" y="3" width="7" height="5"/>
                        <rect x="14" y="12" width="7" height="9"/>
                        <rect x="3" y="16" width="7" height="5"/>
                    </svg>
                    <span>Início</span>
                </button>
                <button class="nav-item" data-nav="turmas">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                    </svg>
                    <span>Turmas</span>
                </button>
                <button class="nav-item" data-nav="presenca">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    <span>Presença</span>
                </button>
                <button class="nav-item" data-nav="profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span>Perfil</span>
                </button>
            </nav>
        </div>
        
        <!-- OUTRAS TELAS -->
        <div id="screen-turmas" class="screen" style="display: none;">
            <header class="header">
                <button class="btn btn-icon" data-back>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h2>Turmas</h2>
            </header>
            <main class="content">
                <div id="turmas-list" class="card-list"></div>
            </main>
        </div>
        
        <div id="screen-alunos" class="screen" style="display: none;">
            <header class="header">
                <button class="btn btn-icon" data-back>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h2>Alunos</h2>
            </header>
            <main class="content">
                <div id="alunos-list" class="card-list"></div>
            </main>
        </div>
        
        <div id="screen-presenca" class="screen" style="display: none;">
            <header class="header">
                <button class="btn btn-icon" data-back>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h2>Presença</h2>
            </header>
            <main class="content">
                <div class="form-group">
                    <label>Selecionar Turma</label>
                    <select id="presenca-turma-select" onchange="loadPresenca(this.value)">
                    </select>
                </div>
                <div id="presenca-list"></div>
            </main>
        </div>
        
    </div>
    
    <!-- Scripts -->
    <script src="supabase.js"></script>
    <script src="app.js"></script>
    
    <script>
        // Funções globais para navegação
        function showRegister() {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('screen-register').style.display = 'flex';
        }
        
        function showLogin() {
            document.getElementById('screen-register').style.display = 'none';
            document.getElementById('screen-login').style.display = 'flex';
        }
    </script>
</body>
</html>
